name: Chatwork タスク自動作成

on:
  schedule:
    - cron: '0 2 15 * *'
  workflow_dispatch:

jobs:
  create-tasks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests jpholiday
      - name: タスク作成実行
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
        run: python jinji_bbs_tasks.py
